<input class="form-control mb-2" type="text" placeholder="Add meg a film címét" [(ngModel)]="movie.title">
<input class="form-control mb-2" type="number" placeholder="Add meg a film évszámát" [(ngModel)]="movie.year">
<input class="form-control mb-2" type="text" placeholder="Add meg a film képét URL-ben" [(ngModel)]="movie.imgUrl">

<div class="form-check form-switch">
    <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault" [(ngModel)]="movie.watched">
    <label class="form-check-label" for="switchCheckDefault">A filmet már megnéztem</label>
</div>

<p>Az értékelést később szerkesztheted.</p>

<button class="btn btn-primary me-3" (click)="save()">
    <i class="bi bi-floppy"></i>
    Mentés
</button>

<button class="btn btn-outline-primary" routerLink="/list">
    Mégse
</button>
