<h2>Filmlista</h2>

<p>Kedvenc filmjeid nyilvántartása és értékelése</p>

<button class="btn btn-primary clear" routerLink="/create">
    <i class="bi bi-plus"></i>
    Új film hozzáadása
</button>

<hr>

<div class="row g-4 mt-3">
    <div class="col-12 col-lg-6" *ngFor="let item of service.movies">
        <div class="card h-100">
            <div class="row g-0 h-100">
                <div class="col-md-4">
                    <img
                        [src]="item.imgUrl"
                        class="img-fluid rounded-start movie-img"
                        [alt]="item.title">
                </div>

                <div class="col-md-8">
                    <div class="card-body d-flex flex-column h-100">
                        <h5 class="card-title">{{ item.title }}</h5>

                        <p class="card-text">
                            <span class="badge text-bg-light">{{ item.year }}</span>
                        </p>

                        <p class="card-text">
                            <span
                                class="badge"
                                [ngClass]="item.watched ? 'text-bg-success' : 'text-bg-warning'">
                                {{ item.watched ? 'Megnézve' : 'Még nem láttam' }}
                            </span>
                        </p>

                        <p class="card-text">
                            <ng-container *ngIf="item.rating; else noRating">
                                Értékelés: {{ item.rating }}/5
                            </ng-container>

                            <ng-template #noRating>
                                <span class="text-muted">Nincs értékelve</span>
                            </ng-template>
                        </p>

                        <div class="mt-auto">
                            <a routerLink="/edit/{{ item.id }}" class="btn btn-sm btn-outline-primary me-3">
                                <i class="bi bi-pencil-square"></i>
                                Értékelés szerkesztése
                            </a>

                            <button type="button" (click)="delete(item)" class="btn btn-sm btn-danger">
                                <i class="bi bi-trash3"></i>
                                Törlés
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
