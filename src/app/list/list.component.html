<h2>Filmlista</h2>

<p>Kedvenc filmjeid nyilvántartása és értékelése</p>

<button class="btn btn-primary clear" routerLink="/create">
    <i class="bi bi-plus"></i>
    Új film hozzáadása
</button>

<hr>

<div class="card mb-3 mt-5 me-5" style="max-width: 540px;" *ngFor="let item of service.movies">
    <div class="row g-0">
        <div class="col-md-4">
            <img src="{{ item.imgUrl }}" class="img-fluid rounded-start" alt="...">
        </div>
        <div class="col-md-8">
            <div class="card-body">
                <h5 class="card-title">{{ item.title }}</h5>
                <p class="card-text">
                    <span class="badge text-bg-light">{{ item.year }}</span>
                </p>
                <p class="card-text">
                    <span class="badge" [ngClass]="item.watched ? 'text-bg-success' : 'text-bg-warning'">
                        <span *ngIf="item.watched; else notWatched">Megnézve</span>
                        <ng-template #notWatched>
                            <span *ngIf="!item.watched">Még nem láttam</span>
                        </ng-template>
                    </span>
                </p>
                <p class="card-text mb-5">Értékelés: {{ item.rating }}/5</p>
                <a routerLink="/edit/{{item.id}}" class="btn btn-sm btn-outline-primary me-3">
                    <i class="bi bi-pencil-square"></i>
                    Értékelés szerkesztése
                </a>
                <a (click)="delete(item)" class="btn btn-sm btn-danger">
                    <i class="bi bi-trash3"></i>
                    Törlés
                </a>
            </div>
        </div>
    </div>
</div>
